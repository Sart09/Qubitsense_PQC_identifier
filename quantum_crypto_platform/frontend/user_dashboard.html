<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Scans - Quantum Crypto Intelligence</title>
    <meta name="description" content="View your scan history and monitor domains." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1321 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(17, 24, 39, .75);
            border: 1px solid rgba(99, 102, 241, .2);
            backdrop-filter: blur(12px);
        }

        .risk-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .08);
        }

        .risk-fill {
            height: 100%;
            border-radius: 3px;
            transition: width .6s ease;
        }

        .risk-crit .risk-fill {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        .risk-high .risk-fill {
            background: linear-gradient(90deg, #f97316, #ea580c);
        }

        .risk-med .risk-fill {
            background: linear-gradient(90deg, #eab308, #ca8a04);
        }

        .risk-low .risk-fill {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .badge-completed {
            background: rgba(34, 197, 94, .15);
            color: #4ade80;
        }

        .badge-running {
            background: rgba(59, 130, 246, .15);
            color: #60a5fa;
        }

        .badge-queued {
            background: rgba(234, 179, 8, .15);
            color: #facc15;
        }

        .badge-failed {
            background: rgba(239, 68, 68, .15);
            color: #f87171;
        }

        .badge-cached {
            background: rgba(139, 92, 246, .15);
            color: #a78bfa;
        }

        .monitor-on {
            color: #6366f1;
        }

        .monitor-off {
            color: #4b5563;
        }

        .scan-row:hover {
            background: rgba(99, 102, 241, .06);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn .3s ease both;
        }
    </style>
</head>

<body class="text-white">

    <!-- Nav -->
    <nav class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
        <div class="flex items-center gap-3">
            <div
                class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                Q</div>
            <span class="text-lg font-bold text-white">Quantum Crypto Intelligence</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="userEmail" class="text-sm text-gray-400"></span>
            <a href="/scanner" class="text-sm text-indigo-400 hover:text-indigo-300">New Scan</a>
            <button onclick="logout()"
                class="px-4 py-1.5 rounded-lg bg-gray-800 border border-gray-700 text-gray-300 text-sm hover:bg-gray-700 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white">Your Scans</h1>
                <p class="text-sm text-gray-400 mt-1">Domain scan history and monitoring</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="scanCount" class="text-sm text-gray-500"></span>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="glass-card rounded-xl p-5">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Total Scans</div>
                <div id="statTotal" class="text-3xl font-bold text-white">-</div>
            </div>
            <div class="glass-card rounded-xl p-5">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Avg Risk Score</div>
                <div id="statAvgRisk" class="text-3xl font-bold text-amber-400">-</div>
            </div>
            <div class="glass-card rounded-xl p-5">
                <div class="text-xs text-gray-400 uppercase tracking-wider mb-1">Monitored</div>
                <div id="statMonitored" class="text-3xl font-bold text-indigo-400">-</div>
            </div>
        </div>

        <!-- Scan List -->
        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
                <h2 class="font-semibold text-white">Scan History</h2>
            </div>
            <div id="scanList" class="divide-y divide-gray-800/60">
                <div class="p-12 text-center text-gray-500">Loading scans...</div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-5xl mb-4 opacity-30">&#128270;</div>
            <h3 class="text-lg font-semibold text-gray-300 mb-2">No scans yet</h3>
            <p class="text-sm text-gray-500 mb-4">Start by scanning your first domain.</p>
            <a href="/scanner"
                class="inline-block px-6 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-sm font-semibold hover:shadow-lg hover:shadow-indigo-500/25 transition">Scan
                a Domain</a>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        const email = localStorage.getItem('email');

        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('userEmail').textContent = email || '';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('email');
            localStorage.removeItem('user_id');
            window.location.href = '/login';
        }

        function riskClass(score) {
            if (score >= 75) return 'risk-crit';
            if (score >= 50) return 'risk-high';
            if (score >= 25) return 'risk-med';
            return 'risk-low';
        }

        function riskColor(score) {
            if (score >= 75) return '#ef4444';
            if (score >= 50) return '#f97316';
            if (score >= 25) return '#eab308';
            return '#22c55e';
        }

        async function toggleMonitor(domain, current) {
            try {
                await fetch(`/monitor/domain?domain=${encodeURIComponent(domain)}&monitored=${!current}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                loadScans();
            } catch (err) {
                console.error('Monitor toggle failed:', err);
            }
        }

        function renderScans(scans) {
            const list = document.getElementById('scanList');
            const empty = document.getElementById('emptyState');

            if (scans.length === 0) {
                list.parentElement.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            // Stats
            document.getElementById('statTotal').textContent = scans.length;
            const avg = scans.length > 0 ? Math.round(scans.reduce((s, x) => s + x.risk_score, 0) / scans.length) : 0;
            document.getElementById('statAvgRisk').textContent = avg + '/100';
            document.getElementById('statMonitored').textContent = scans.filter(s => s.monitored).length;

            list.innerHTML = scans.map((s, i) => `
        <div class="scan-row flex items-center px-6 py-4 cursor-pointer transition fade-in" style="animation-delay:${i * 50}ms"
             onclick="window.location.href='/dashboard/${s.scan_id}'">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-3 mb-1">
              <span class="text-sm font-semibold text-white">${s.domain}</span>
              <span class="badge badge-${s.status}">${s.status}</span>
              ${s.monitored ? '<span class="badge" style="background:rgba(99,102,241,.15);color:#818cf8;">monitored</span>' : ''}
            </div>
            <div class="text-xs text-gray-500">Scan #${s.scan_id} &middot; ${new Date(s.created_at).toLocaleString()}</div>
          </div>
          <div class="flex items-center gap-6">
            <!-- Risk Bar -->
            <div class="w-32">
              <div class="flex justify-between text-xs mb-1">
                <span class="text-gray-500">Risk</span>
                <span style="color:${riskColor(s.risk_score)}" class="font-semibold">${s.risk_score}</span>
              </div>
              <div class="risk-bar ${riskClass(s.risk_score)}">
                <div class="risk-fill" style="width:${s.risk_score}%"></div>
              </div>
            </div>
            <!-- Monitor Toggle -->
            <button onclick="event.stopPropagation(); toggleMonitor('${s.domain}', ${s.monitored})"
              class="${s.monitored ? 'monitor-on' : 'monitor-off'} hover:text-indigo-400 transition text-lg" title="Toggle monitoring">
              ${s.monitored ? '&#9733;' : '&#9734;'}
            </button>
          </div>
        </div>
      `).join('');
        }

        async function loadScans() {
            try {
                const res = await fetch('/user/scans', {
                    headers: { 'Authorization': `Bearer ${token}` },
                });
                if (res.status === 401) {
                    logout();
                    return;
                }
                const data = await res.json();
                renderScans(data.scans || []);
            } catch (err) {
                console.error('Failed to load scans:', err);
            }
        }

        loadScans();
    </script>
</body>

</html>
