<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Quantum Crypto Intelligence</title>
    <meta name="description" content="Login or register for the Quantum Crypto Intelligence Platform." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1321 100%);
            min-height: 100vh;
        }

        .glow-card {
            background: rgba(17, 24, 39, .85);
            border: 1px solid rgba(99, 102, 241, .25);
            backdrop-filter: blur(12px);
        }

        .tab-active {
            color: #818cf8;
            border-color: #818cf8;
        }

        .tab-inactive {
            color: #6b7280;
            border-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
        }
    </style>
</head>

<body class="flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-2">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg">
                    Q</div>
                <h1 class="text-2xl font-bold text-white">Quantum Crypto Intelligence</h1>
            </div>
            <p class="text-sm text-gray-400">Post-quantum security analysis platform</p>
        </div>

        <!-- Card -->
        <div class="glow-card rounded-2xl p-8">
            <!-- Tabs -->
            <div class="flex border-b border-gray-700 mb-6">
                <button id="loginTab" onclick="switchTab('login')"
                    class="flex-1 pb-3 text-sm font-semibold border-b-2 tab-active transition-colors">Login</button>
                <button id="registerTab" onclick="switchTab('register')"
                    class="flex-1 pb-3 text-sm font-semibold border-b-2 tab-inactive transition-colors">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input id="loginEmail" type="email" required placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800/60 border border-gray-600/40 text-white text-sm placeholder-gray-500 focus:border-indigo-500 focus:outline-none transition" />
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input id="loginPassword" type="password" required placeholder="Enter password"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800/60 border border-gray-600/40 text-white text-sm placeholder-gray-500 focus:border-indigo-500 focus:outline-none transition" />
                </div>
                <button type="submit" id="loginBtn"
                    class="w-full py-3 rounded-xl btn-primary text-white font-semibold text-sm transition-all hover:shadow-lg hover:shadow-indigo-500/25">
                    Sign In
                </button>
                <div id="loginMsg" class="text-sm text-center hidden"></div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input id="regEmail" type="email" required placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800/60 border border-gray-600/40 text-white text-sm placeholder-gray-500 focus:border-indigo-500 focus:outline-none transition" />
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input id="regPassword" type="password" required minlength="6" placeholder="Min 6 characters"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800/60 border border-gray-600/40 text-white text-sm placeholder-gray-500 focus:border-indigo-500 focus:outline-none transition" />
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider">Confirm Password</label>
                    <input id="regConfirm" type="password" required placeholder="Confirm password"
                        class="w-full px-4 py-3 rounded-xl bg-gray-800/60 border border-gray-600/40 text-white text-sm placeholder-gray-500 focus:border-indigo-500 focus:outline-none transition" />
                </div>
                <button type="submit" id="regBtn"
                    class="w-full py-3 rounded-xl btn-primary text-white font-semibold text-sm transition-all hover:shadow-lg hover:shadow-indigo-500/25">
                    Create Account
                </button>
                <div id="regMsg" class="text-sm text-center hidden"></div>
            </form>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">
            <a href="/scanner" class="text-indigo-400 hover:text-indigo-300">Skip login and proceed to scanner</a> (no
            account required)
        </p>
    </div>

    <script>
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (tab === 'login') {
                loginTab.className = loginTab.className.replace('tab-inactive', 'tab-active');
                registerTab.className = registerTab.className.replace('tab-active', 'tab-inactive');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.className = registerTab.className.replace('tab-inactive', 'tab-active');
                loginTab.className = loginTab.className.replace('tab-active', 'tab-inactive');
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        function showMsg(id, msg, isError) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = `text-sm text-center mt-2 ${isError ? 'text-red-400' : 'text-emerald-400'}`;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');

                localStorage.setItem('token', data.token);
                localStorage.setItem('email', data.email);
                localStorage.setItem('user_id', data.user_id);
                showMsg('loginMsg', 'Login successful! Redirecting...', false);
                setTimeout(() => window.location.href = '/user-dashboard', 800);
            } catch (err) {
                showMsg('loginMsg', err.message, true);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (password !== confirm) {
                showMsg('regMsg', 'Passwords do not match', true);
                return;
            }

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');

                localStorage.setItem('token', data.token);
                localStorage.setItem('email', data.email);
                localStorage.setItem('user_id', data.user_id);
                showMsg('regMsg', 'Account created! Redirecting...', false);
                setTimeout(() => window.location.href = '/user-dashboard', 800);
            } catch (err) {
                showMsg('regMsg', err.message, true);
            }
        }

        // If already logged in, redirect
        if (localStorage.getItem('token')) {
            window.location.href = '/user-dashboard';
        }
    </script>
</body>

</html>
